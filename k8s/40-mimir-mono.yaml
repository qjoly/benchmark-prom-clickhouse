# Optional: a single-instance monolithic Mimir (RF=1, no clustering) to isolate the
# cost of RF=3 + gossip from the engine itself. Applied on its own bucket, alongside
# the 3-node cluster, without touching it. Apply with:
#   kubectl apply -f k8s/40-mimir-mono.yaml   (needs bucket mimir-mono-blocks + objstore-creds)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-mono-config
  namespace: bench-prom-ch
data:
  mimir.yaml: |
    multitenancy_enabled: false
    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: warn
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
    common:
      storage:
        backend: s3
        s3:
          endpoint: rustfs:9000
          access_key_id: ${OBJSTORE_ACCESS_KEY}
          secret_access_key: ${OBJSTORE_SECRET_KEY}
          insecure: true
    blocks_storage:
      backend: s3
      s3: { bucket_name: mimir-mono-blocks }
      tsdb: { dir: /data/tsdb }
      bucket_store: { sync_dir: /data/tsdb-sync }
    ingester:
      ring: { replication_factor: 1, kvstore: { store: inmemory } }
    distributor:
      ring: { kvstore: { store: inmemory } }
    store_gateway:
      sharding_ring: { replication_factor: 1, kvstore: { store: inmemory } }
    compactor:
      data_dir: /data/compactor
      compaction_interval: 5m
      sharding_ring: { kvstore: { store: inmemory } }
    ruler_storage:
      backend: s3
      s3: { bucket_name: mimir-ruler }
    limits:
      ingestion_rate: 10000000
      ingestion_burst_size: 40000000
      max_global_series_per_user: 0
      max_global_series_per_metric: 0
      max_label_names_per_series: 60
      out_of_order_time_window: 40h
      creation_grace_period: 30m
      max_fetched_chunks_per_query: 0
      max_fetched_series_per_query: 0
      max_fetched_chunk_bytes_per_query: 0
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-mono
  namespace: bench-prom-ch
spec:
  selector: { app: mimir-mono }
  ports:
    - { name: http, port: 9009 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-mono
  namespace: bench-prom-ch
spec:
  replicas: 1
  selector: { matchLabels: { app: mimir-mono } }
  template:
    metadata: { labels: { app: mimir-mono } }
    spec:
      securityContext: { fsGroup: 10001 }
      containers:
        - name: mimir
          image: grafana/mimir:2.13.0
          args: ["-config.file=/etc/mimir/mimir.yaml", "-config.expand-env=true", "-target=all"]
          env:
            - { name: OBJSTORE_ACCESS_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: access-key } } }
            - { name: OBJSTORE_SECRET_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: secret-key } } }
          ports: [{ containerPort: 9009 }, { containerPort: 9095 }]
          volumeMounts:
            - { name: config, mountPath: /etc/mimir/mimir.yaml, subPath: mimir.yaml }
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits: { cpu: "6", memory: "16Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: 9009 }
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - { name: config, configMap: { name: mimir-mono-config } }
        - { name: data, emptyDir: { sizeLimit: 60Gi } }
