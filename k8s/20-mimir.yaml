apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: bench-prom-ch
spec:
  selector: { app: rustfs }
  ports:
    - { name: s3, port: 9000 }
    - { name: console, port: 9101 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: bench-prom-ch
spec:
  replicas: 1
  selector: { matchLabels: { app: rustfs } }
  template:
    metadata: { labels: { app: rustfs } }
    spec:
      securityContext: { fsGroup: 10001 }
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          env:
            - { name: RUSTFS_VOLUMES, value: /data }
            - { name: RUSTFS_ADDRESS, value: "0.0.0.0:9000" }
            - { name: RUSTFS_CONSOLE_ADDRESS, value: "0.0.0.0:9101" }
            - { name: RUSTFS_CONSOLE_ENABLE, value: "true" }
            - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: access-key } } }
            - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: secret-key } } }
          ports: [{ containerPort: 9000 }, { containerPort: 9101 }]
          volumeMounts: [{ name: data, mountPath: /data }]
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { cpu: "2", memory: "4Gi" }
      volumes:
        - name: data
          emptyDir: { sizeLimit: 30Gi }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-init
  namespace: bench-prom-ch
spec:
  backoffLimit: 20
  template:
    metadata: { labels: { app: rustfs-init } }
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - { name: AK, valueFrom: { secretKeyRef: { name: objstore-creds, key: access-key } } }
            - { name: SK, valueFrom: { secretKeyRef: { name: objstore-creds, key: secret-key } } }
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set r http://rustfs:9000 "$AK" "$SK"; do sleep 3; done
              mc mb -p r/mimir-blocks
              mc mb -p r/mimir-ruler
              echo "buckets ready"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: bench-prom-ch
data:
  mimir.yaml: |
    multitenancy_enabled: false
    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: warn
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
    common:
      storage:
        backend: s3
        s3:
          endpoint: rustfs:9000
          access_key_id: ${OBJSTORE_ACCESS_KEY}
          secret_access_key: ${OBJSTORE_SECRET_KEY}
          insecure: true
    blocks_storage:
      backend: s3
      s3: { bucket_name: mimir-blocks }
      tsdb: { dir: /data/tsdb }
      bucket_store: { sync_dir: /data/tsdb-sync }
    memberlist:
      join_members:
        - dns+mimir-gossip.bench-prom-ch.svc.cluster.local:7946
    ingester:
      ring: { replication_factor: 3, kvstore: { store: memberlist } }
    distributor:
      ring: { kvstore: { store: memberlist } }
    store_gateway:
      sharding_ring: { replication_factor: 3, kvstore: { store: memberlist } }
    compactor:
      data_dir: /data/compactor
      compaction_interval: 5m
      sharding_ring: { kvstore: { store: memberlist } }
    ruler_storage:
      backend: s3
      s3: { bucket_name: mimir-ruler }
    # Keep this limits block in sync with mimir/mimir.yaml (docker). Only the
    # memberlist section is intentionally different between the two.
    limits:
      ingestion_rate: 10000000
      ingestion_burst_size: 40000000
      max_global_series_per_user: 0
      max_global_series_per_metric: 0
      max_label_names_per_series: 60
      out_of_order_time_window: 40h
      creation_grace_period: 30m
      max_fetched_chunks_per_query: 0
      max_fetched_series_per_query: 0
      max_fetched_chunk_bytes_per_query: 0
---
apiVersion: v1
kind: Service
metadata:
  name: mimir-gossip
  namespace: bench-prom-ch
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector: { app: mimir }
  ports:
    - { name: gossip, port: 7946 }
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: bench-prom-ch
spec:
  selector: { app: mimir }
  ports:
    - { name: http, port: 9009 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir
  namespace: bench-prom-ch
spec:
  serviceName: mimir-gossip
  replicas: 3
  podManagementPolicy: Parallel
  selector: { matchLabels: { app: mimir } }
  template:
    metadata: { labels: { app: mimir } }
    spec:
      securityContext: { fsGroup: 10001 }
      containers:
        - name: mimir
          image: grafana/mimir:2.13.0
          args: ["-config.file=/etc/mimir/mimir.yaml", "-config.expand-env=true", "-target=all"]
          env:
            - { name: OBJSTORE_ACCESS_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: access-key } } }
            - { name: OBJSTORE_SECRET_KEY, valueFrom: { secretKeyRef: { name: objstore-creds, key: secret-key } } }
          ports:
            - { name: http, containerPort: 9009 }
            - { name: grpc, containerPort: 9095 }
            - { name: gossip, containerPort: 7946 }
          volumeMounts:
            - { name: config, mountPath: /etc/mimir/mimir.yaml, subPath: mimir.yaml }
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits: { cpu: "3", memory: "16Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: 9009 }
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - { name: config, configMap: { name: mimir-config } }
        - { name: data, emptyDir: { sizeLimit: 60Gi } }
