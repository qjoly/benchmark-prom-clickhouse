# Gateway / load-balancer in front of the Mimir cluster (3 nodes).
# TSBS writes and reads through this single entry point -> http://mimir-gw:9009
events {}

http {
    resolver 127.0.0.11 valid=10s;

    upstream mimir_distributor {
        server mimir-1:9009 max_fails=1 fail_timeout=5s;
        server mimir-2:9009 max_fails=1 fail_timeout=5s;
        server mimir-3:9009 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 9009;
        client_max_body_size 100M;

        # remote_write (ingestion) + PromQL (read) + internal endpoints
        location / {
            proxy_pass http://mimir_distributor;
            proxy_set_header Host $host;
        }
    }
}
