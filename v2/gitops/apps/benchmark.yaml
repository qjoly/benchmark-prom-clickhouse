apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: benchmark-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/qjoly/benchmark-prom-clickhouse.git
    targetRevision: main
    path: v2/gitops/benchmark-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: bench-prom-ch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
