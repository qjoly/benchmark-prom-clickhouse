apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# V2 multi-node overlay of the V1 manifests:
#  - ClickHouse (+ Keeper + tsbs driver) pinned to the ch pool, Mimir (+ RustFS +
#    memcached) to the mimir pool, so the two engines never share a machine.
#  - emptyDir -> Cinder PVCs (MKS default StorageClass) for real persistence and
#    meaningful storage numbers.
resources:
  - ../../../k8s
  - pvc.yaml

patches:
  # ---- nodeSelector: ClickHouse pool ----
  - target: { kind: StatefulSet, name: chnode }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: ch }
  - target: { kind: StatefulSet, name: chkeeper }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: ch }
  - target: { kind: Deployment, name: tsbs }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: ch }

  # ---- nodeSelector: Mimir pool ----
  - target: { kind: StatefulSet, name: mimir }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: mimir }
  - target: { kind: Deployment, name: rustfs }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: mimir }
  - target: { kind: Deployment, name: memcached }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: mimir }
  - target: { kind: Job, name: rustfs-init }
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { bench-pool: mimir }

  # one Mimir ingester per node
  - target: { kind: StatefulSet, name: mimir }
    patch: |
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels: { app: mimir }
                topologyKey: kubernetes.io/hostname

  # ---- emptyDir -> Cinder PVC (StatefulSets: volumeClaimTemplates) ----
  # volumeClaimTemplates are immutable, so tell ArgoCD to replace the object.
  - target: { kind: StatefulSet, name: chnode }
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: chnode
        annotations:
          argocd.argoproj.io/sync-options: Replace=true
      spec:
        volumeClaimTemplates:
          - metadata: { name: data }
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: csi-cinder-high-speed-gen2
              resources: { requests: { storage: 30Gi } }
        template:
          spec:
            volumes:
              - name: data
                $patch: delete
  - target: { kind: StatefulSet, name: chkeeper }
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: chkeeper
        annotations:
          argocd.argoproj.io/sync-options: Replace=true
      spec:
        volumeClaimTemplates:
          - metadata: { name: data }
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: csi-cinder-high-speed-gen2
              resources: { requests: { storage: 5Gi } }
        template:
          spec:
            volumes:
              - name: data
                $patch: delete
  - target: { kind: StatefulSet, name: mimir }
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: mimir
        annotations:
          argocd.argoproj.io/sync-options: Replace=true
      spec:
        volumeClaimTemplates:
          - metadata: { name: data }
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: csi-cinder-high-speed-gen2
              resources: { requests: { storage: 50Gi } }
        template:
          spec:
            volumes:
              - name: data
                $patch: delete

  # ---- emptyDir -> Cinder PVC (Deployments: PVC + Recreate strategy) ----
  - target: { kind: Deployment, name: rustfs }
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: rustfs }
      spec:
        strategy: { type: Recreate }
  - target: { kind: Deployment, name: rustfs }
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: data
          persistentVolumeClaim: { claimName: rustfs-data }
  - target: { kind: Deployment, name: tsbs }
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata: { name: tsbs }
      spec:
        strategy: { type: Recreate }
  - target: { kind: Deployment, name: tsbs }
    patch: |
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: workspace
          persistentVolumeClaim: { claimName: tsbs-workspace }
