name: bench-prom-ch

x-clickhouse-common: &clickhouse-common
  image: clickhouse/clickhouse-server:${CH_VERSION:-24.8}
  ulimits:
    nofile:
      soft: 262144
      hard: 262144
  depends_on:
    chkeeper:
      condition: service_started
  networks: [bench]

services:
  chkeeper:
    image: clickhouse/clickhouse-keeper:${CH_VERSION:-24.8}
    container_name: chkeeper
    volumes:
      - ./keeper/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - chkeeper-data:/var/lib/clickhouse-keeper
    networks: [bench]

  chnode1:
    <<: *clickhouse-common
    container_name: chnode1
    hostname: chnode1
    volumes:
      - ./clickhouse/config.d/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/users.d/benchmark.xml:/etc/clickhouse-server/users.d/benchmark.xml:ro
      - ./clickhouse/macros/chnode1.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chnode1-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"

  chnode2:
    <<: *clickhouse-common
    container_name: chnode2
    hostname: chnode2
    volumes:
      - ./clickhouse/config.d/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/users.d/benchmark.xml:/etc/clickhouse-server/users.d/benchmark.xml:ro
      - ./clickhouse/macros/chnode2.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chnode2-data:/var/lib/clickhouse
    ports:
      - "8124:8123"
      - "9001:9000"

  chnode3:
    <<: *clickhouse-common
    container_name: chnode3
    hostname: chnode3
    volumes:
      - ./clickhouse/config.d/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/users.d/benchmark.xml:/etc/clickhouse-server/users.d/benchmark.xml:ro
      - ./clickhouse/macros/chnode3.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chnode3-data:/var/lib/clickhouse
    ports:
      - "8125:8123"
      - "9002:9000"

  chnode4:
    <<: *clickhouse-common
    container_name: chnode4
    hostname: chnode4
    volumes:
      - ./clickhouse/config.d/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - ./clickhouse/users.d/benchmark.xml:/etc/clickhouse-server/users.d/benchmark.xml:ro
      - ./clickhouse/macros/chnode4.xml:/etc/clickhouse-server/config.d/macros.xml:ro
      - chnode4-data:/var/lib/clickhouse
    ports:
      - "8126:8123"
      - "9003:9000"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9101"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${OBJSTORE_ACCESS_KEY:-benchuser}
      RUSTFS_SECRET_KEY: ${OBJSTORE_SECRET_KEY:?set OBJSTORE_SECRET_KEY in .env}
    volumes:
      - rustfs-data:/data
    ports:
      - "9100:9000"
      - "9101:9101"
    networks: [bench]

  rustfs-init:
    image: minio/mc:latest
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set r http://rustfs:9000 ${OBJSTORE_ACCESS_KEY:-benchuser} ${OBJSTORE_SECRET_KEY:?}; do sleep 2; done;
      mc mb -p r/mimir-blocks;
      mc mb -p r/mimir-ruler;
      echo 'buckets ready'; exit 0;
      "
    networks: [bench]

  memcached:
    image: memcached:1.6-alpine
    container_name: memcached
    command: ["-m", "1024", "-I", "8m"]
    networks: [bench]

  mimir-1: &mimir
    image: grafana/mimir:${MIMIR_VERSION:-2.13.0}
    container_name: mimir-1
    command: ["-config.file=/etc/mimir/mimir.yaml", "-config.expand-env=true", "-target=all"]
    environment:
      OBJSTORE_ACCESS_KEY: ${OBJSTORE_ACCESS_KEY:-benchuser}
      OBJSTORE_SECRET_KEY: ${OBJSTORE_SECRET_KEY:?set OBJSTORE_SECRET_KEY in .env}
    hostname: mimir-1
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir1-data:/data
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
    networks: [bench]

  mimir-2:
    <<: *mimir
    container_name: mimir-2
    hostname: mimir-2
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir2-data:/data

  mimir-3:
    <<: *mimir
    container_name: mimir-3
    hostname: mimir-3
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir3-data:/data

  mimir-gw:
    image: nginx:1.27-alpine
    container_name: mimir-gw
    volumes:
      - ./mimir/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9009:9009"
    depends_on: [mimir-1, mimir-2, mimir-3]
    networks: [bench]

  grafana:
    image: grafana/grafana:11.6.16
    container_name: grafana
    profiles: ["obs"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [bench]

  tsbs:
    build:
      context: ./tsbs
      args:
        TSBS_REF: ${TSBS_REF:-master}
    container_name: tsbs
    command: ["sleep", "infinity"]
    working_dir: /workspace
    env_file: .env
    volumes:
      - .:/workspace
    networks: [bench]

networks:
  bench:
    driver: bridge

volumes:
  chkeeper-data:
  chnode1-data:
  chnode2-data:
  chnode3-data:
  chnode4-data:
  rustfs-data:
  mimir1-data:
  mimir2-data:
  mimir3-data:
  grafana-data:
